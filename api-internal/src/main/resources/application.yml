app:
  name: api-internal
  env: local
  log-level: info

db:
  url: jdbc:postgresql://localhost:5432/appdb
  username: app
  password: app
  pool-size: 5

spring:
  application:
    name: ${app.name}
  datasource:
    url: ${db.url}
    username: ${db.username}
    password: ${db.password}
    hikari:
      maximum-pool-size: ${db.pool-size}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: ${app.log-level:INFO}

server:
  port: 8081
